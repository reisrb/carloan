name: CarLoan
options:
  bundleIdPrefix: com.rafaelreis
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

targets:
  CarLoan:
    type: application
    platform: iOS
    sources:
      - path: CarLoan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rafaelreis.carloan
        INFOPLIST_FILE: CarLoan/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: CarLoan/CarLoan.entitlements
